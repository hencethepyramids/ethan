<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Default is the focused-tab icon; src/favicon.js swaps it with the
         light variant when the tab goes to the background. The ?v= param
         busts browsers' sticky favicon cache when the icon changes. -->
    <link rel="icon" type="image/png" href="/favicon-light.png?v=6" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F4F3EF" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0C0C0E" />

    <!-- Set the theme before first paint so dark-mode users never see a flash. -->
    <script>
      try {
        var t = localStorage.getItem('studioTheme')
          || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        document.documentElement.setAttribute('data-theme', t)
      } catch (e) {}
    </script>

    <!-- Fonts are self-hosted (client/public/fonts/ + studio/fonts.css) so
         ad blockers and font-CDN blocking can't strip the typefaces. The
         hero-critical Archivo file is preloaded to minimize FOUT. -->
    <link rel="preload" href="/fonts/archivo-100-900-latin.woff2" as="font" type="font/woff2" crossorigin />

    <!-- The block below is the landing page's head; scripts/prerender.mjs
         swaps it per route at build time. Keep the markers. -->
    <!--seo-->
    <title>Ethan Ellerstein - AI · Full-stack · Security</title>
    <meta name="description" content="Ethan Ellerstein is a software engineer who ships AI products, builds the full-stack around them, and secures what he makes. Range is the point." />
    <meta name="author" content="Ethan Ellerstein" />
    <link rel="canonical" href="https://ethanellerstein.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ethanellerstein.com/" />
    <meta property="og:title" content="Ethan Ellerstein - AI · Full-stack · Security" />
    <meta property="og:description" content="Ethan Ellerstein is a software engineer who ships AI products, builds the full-stack around them, and secures what he makes. Range is the point." />
    <meta property="og:site_name" content="Ethan Ellerstein" />
    <meta property="og:image" content="https://ethanellerstein.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Ethan Ellerstein - AI · Full-stack · Security" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ethan Ellerstein - AI · Full-stack · Security" />
    <meta name="twitter:description" content="Ethan Ellerstein is a software engineer who ships AI products, builds the full-stack around them, and secures what he makes. Range is the point." />
    <meta name="twitter:image" content="https://ethanellerstein.com/og.png" />
    <!--/seo-->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
